<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="walletGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fundo -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>

  <!-- Glow de fundo -->
  <circle cx="256" cy="256" r="200" fill="url(#glowGrad)"/>

  <!-- Carteira principal -->
  <g filter="url(#glow)">
    <!-- Corpo da carteira -->
    <rect x="110" y="140" width="292" height="232" rx="28" fill="url(#walletGrad)" opacity="0.95"/>

    <!-- Aba superior da carteira -->
    <path d="M 110 180 Q 110 140 150 140 L 362 140 Q 402 140 402 180 L 402 200 L 110 200 Z" fill="url(#walletGrad)"/>

    <!-- Linha divisória -->
    <line x1="110" y1="200" x2="402" y2="200" stroke="#a78bfa" stroke-width="3" opacity="0.6"/>

    <!-- Fecho da carteira -->
    <rect x="340" y="230" width="80" height="60" rx="30" fill="#0a0e1a" opacity="0.4"/>
    <circle cx="380" cy="260" r="18" fill="#e2e8f0" opacity="0.9"/>
    <circle cx="380" cy="260" r="12" fill="url(#accentGrad)"/>

    <!-- Circuitos digitais -->
    <g stroke="#e2e8f0" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7">
      <!-- Circuito 1 -->
      <path d="M 140 240 L 200 240 L 220 260"/>
      <circle cx="140" cy="240" r="4" fill="#e2e8f0"/>
      <circle cx="220" cy="260" r="4" fill="#e2e8f0"/>

      <!-- Circuito 2 -->
      <path d="M 140 280 L 240 280 L 260 300 L 300 300"/>
      <circle cx="140" cy="280" r="4" fill="#e2e8f0"/>
      <circle cx="300" cy="300" r="4" fill="#e2e8f0"/>

      <!-- Circuito 3 -->
      <path d="M 140 320 L 180 320 L 200 340"/>
      <circle cx="140" cy="320" r="4" fill="#e2e8f0"/>
      <circle cx="200" cy="340" r="4" fill="#e2e8f0"/>

      <!-- Chip central -->
      <rect x="250" y="245" width="30" height="30" rx="4" fill="none" stroke-width="2.5"/>
      <line x1="265" y1="245" x2="265" y2="235"/>
      <line x1="265" y1="275" x2="265" y2="285"/>
      <line x1="250" y1="260" x2="240" y2="260"/>
      <line x1="280" y1="260" x2="290" y2="260"/>
    </g>

    <!-- Linhas decorativas -->
    <line x1="150" y1="340" x2="280" y2="340" stroke="#a78bfa" stroke-width="4" opacity="0.4" stroke-linecap="round"/>
    <line x1="150" y1="355" x2="230" y2="355" stroke="#a78bfa" stroke-width="4" opacity="0.25" stroke-linecap="round"/>
  </g>
</svg>