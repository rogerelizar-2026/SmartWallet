<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="logoGradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  
  <!-- Fundo -->
  <rect width="800" height="300" fill="#0a0e1a"/>
  
  <!-- Ícone da Carteira -->
  <g transform="translate(80, 50)">
    <!-- Corpo da carteira -->
    <rect x="0" y="40" width="200" height="160" rx="16" fill="none" stroke="url(#logoGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Aba superior -->
    <path d="M 0 70 Q 0 40 20 40 L 160 40 Q 180 40 180 70 L 180 85 L 0 85 Z" fill="none" stroke="url(#logoGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Fecho -->
    <rect x="140" y="105" width="50" height="40" rx="20" fill="none" stroke="url(#logoGradient)" stroke-width="8"/>
    <circle cx="165" cy="125" r="12" fill="url(#logoGradient)"/>
    
    <!-- Circuitos - Linha 1 -->
    <path d="M 30 100 L 80 100 L 95 115 L 120 115" fill="none" stroke="url(#logoGradient2)" stroke-width="5" stroke-linecap="round"/>
    <circle cx="30" cy="100" r="4" fill="url(#logoGradient2)"/>
    <circle cx="120" cy="115" r="4" fill="url(#logoGradient2)"/>
    
    <!-- Circuitos - Linha 2 -->
    <path d="M 30 130 L 100 130 L 115 145 L 140 145" fill="none" stroke="url(#logoGradient2)" stroke-width="5" stroke-linecap="round"/>
    <circle cx="30" cy="130" r="4" fill="url(#logoGradient2)"/>
    <circle cx="140" cy="145" r="4" fill="url(#logoGradient2)"/>
    
    <!-- Circuitos - Linha 3 -->
    <path d="M 30 160 L 70 160 L 85 175" fill="none" stroke="url(#logoGradient2)" stroke-width="5" stroke-linecap="round"/>
    <circle cx="30" cy="160" r="4" fill="url(#logoGradient2)"/>
    <circle cx="85" cy="175" r="4" fill="url(#logoGradient2)"/>
    
    <!-- Circuitos - Linha 4 -->
    <path d="M 100 100 L 100 90" fill="none" stroke="url(#logoGradient2)" stroke-width="5" stroke-linecap="round"/>
    <circle cx="100" cy="90" r="4" fill="url(#logoGradient2)"/>
    
    <!-- Circuitos - Linha 5 -->
    <path d="M 130 170 L 130 185" fill="none" stroke="url(#logoGradient2)" stroke-width="5" stroke-linecap="round"/>
    <circle cx="130" cy="185" r="4" fill="url(#logoGradient2)"/>
  </g>
  
  <!-- Texto "Smart Wallet" -->
  <text x="320" y="165" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">
    Smart
  </text>
  <text x="320" y="245" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">
    Wallet
  </text>
</svg>