<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="logoGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="logoGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fundo circular suave -->
  <circle cx="100" cy="100" r="95" fill="url(#logoGrad)" opacity="0.08"/>

  <!-- Carteira estilizada -->
  <g filter="url(#logoGlow)">
    <!-- Corpo principal -->
    <rect x="30" y="55" width="140" height="95" rx="16" fill="url(#logoGrad)"/>

    <!-- Aba superior -->
    <path d="M 30 75 Q 30 55 50 55 L 140 55 Q 160 55 160 75 L 160 85 L 30 85 Z" fill="url(#logoGrad)"/>

    <!-- Linha divisória -->
    <line x1="30" y1="85" x2="160" y2="85" stroke="white" stroke-width="2" opacity="0.5"/>

    <!-- Fecho -->
    <rect x="130" y="95" width="40" height="30" rx="15" fill="#0a0e1a" opacity="0.3"/>
    <circle cx="150" cy="110" r="10" fill="white" opacity="0.9"/>
    <circle cx="150" cy="110" r="6" fill="url(#logoGrad2)"/>

    <!-- Circuitos -->
    <g stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.75">
      <path d="M 50 100 L 80 100 L 90 110"/>
      <circle cx="50" cy="100" r="2.5" fill="white"/>
      <circle cx="90" cy="110" r="2.5" fill="white"/>

      <path d="M 50 120 L 100 120 L 110 130 L 125 130"/>
      <circle cx="50" cy="120" r="2.5" fill="white"/>
      <circle cx="125" cy="130" r="2.5" fill="white"/>

      <path d="M 50 135 L 70 135 L 80 145"/>
      <circle cx="50" cy="135" r="2.5" fill="white"/>
      <circle cx="80" cy="145" r="2.5" fill="white"/>

      <!-- Chip -->
      <rect x="105" y="100" width="14" height="14" rx="2" fill="none" stroke-width="1.5"/>
      <line x1="112" y1="100" x2="112" y2="95"/>
      <line x1="112" y1="114" x2="112" y2="119"/>
      <line x1="105" y1="107" x2="100" y2="107"/>
      <line x1="119" y1="107" x2="124" y2="107"/>
    </g>

    <!-- Linhas decorativas -->
    <line x1="55" y1="140" x2="115" y2="140" stroke="white" stroke-width="2.5" opacity="0.35" stroke-linecap="round"/>
    <line x1="55" y1="147" x2="90" y2="147" stroke="white" stroke-width="2.5" opacity="0.2" stroke-linecap="round"/>
  </g>
</svg>