<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gerenciador Financeiro</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
    <!-- Header Simplificada: Apenas Logo e Frase -->
    <header class="app-header">
        <div class="header-content">
            <h1 class="logo">Finanças<span class="highlight">Pro</span></h1>
            <p class="tagline">Controle total na palma da mão</p>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="container">
        <!-- Cards de Resumo -->
        <section class="summary-cards">
            <div class="card income">
                <div class="card-icon">💰</div>
                <div class="card-info">
                    <span class="label">Receitas</span>
                    <span class="value" id="income-value">R$ 0,00</span>
                </div>
            </div>
            <div class="card expense">
                <div class="card-icon">💸</div>
                <div class="card-info">
                    <span class="label">Despesas</span>
                    <span class="value" id="expense-value">R$ 0,00</span>
                </div>
            </div>
            <div class="card balance">
                <div class="card-icon">⚖️</div>
                <div class="card-info">
                    <span class="label">Saldo</span>
                    <span class="value" id="balance-value">R$ 0,00</span>
                </div>
            </div>
        </section>

        <!-- Gráfico -->
        <section class="chart-section">
            <div class="chart-card">
                <canvas id="financeChart"></canvas>
            </div>
        </section>

        <!-- Lista de Transações -->
        <section class="transactions-section">
            <h2 class="section-title">Transações Recentes</h2>
            <div class="transactions-list" id="transactions-list">
                <!-- Inserido via JS -->
            </div>
        </section>
    </main>

    <!-- Barra Flutuante Inferior (Nova) -->
    <div class="floating-bottom-bar">
        <div class="bar-content">
            <!-- Seletor de Mês/Ano -->
            <div class="month-selector">
                <button id="prev-month" class="nav-btn" aria-label="Mês anterior">❮</button>
                <span id="current-month-year" class="month-display">Janeiro 2024</span>
                <button id="next-month" class="nav-btn" aria-label="Próximo mês">❯</button>
            </div>

            <!-- Botões de Ação -->
            <div class="action-buttons">
                <button id="btn-notifications" class="icon-btn" aria-label="Notificações">🔔</button>
                <button id="btn-privacy" class="icon-btn" aria-label="Privacidade">🔒</button>
                <button id="btn-theme" class="icon-btn" aria-label="Alternar Tema">🌓</button>
                <button id="btn-menu" class="icon-btn" aria-label="Menu">☰</button>
                
                <!-- Espaçador para empurrar o botão + para a direita se necessário, ou layout flex -->
                <div class="spacer"></div>
                
                <button id="btn-add" class="add-btn" aria-label="Adicionar Transação">+</button>
            </div>
        </div>
    </div>

    <!-- Modal de Adição/Edição -->
    <div id="transaction-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modal-title">Nova Transação</h2>
            <form id="transaction-form">
                <input type="hidden" id="trans-id">
                <div class="form-group">
                    <label for="trans-description">Descrição</label>
                    <input type="text" id="trans-description" required placeholder="Ex: Salário, Aluguel">
                </div>
                <div class="form-group">
                    <label for="trans-amount">Valor</label>
                    <input type="number" id="trans-amount" step="0.01" required placeholder="0.00">
                </div>
                <div class="form-group">
                    <label for="trans-type">Tipo</label>
                    <select id="trans-type">
                        <option value="income">Receita</option>
                        <option value="expense">Despesa</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="trans-date">Data</label>
                    <input type="date" id="trans-date" required>
                </div>
                <button type="submit" class="save-btn">Salvar</button>
            </form>
        </div>
    </div>

    <!-- Menu Lateral -->
    <div id="side-menu" class="side-menu">
        <div class="menu-header">
            <h3>Menu</h3>
            <span class="close-menu">&times;</span>
        </div>
        <ul class="menu-items">
            <li><a href="#" data-action="dashboard">Dashboard</a></li>
            <li><a href="#" data-action="reports">Relatórios</a></li>
            <li><a href="#" data-action="settings">Configurações</a></li>
            <li><a href="#" data-action="logout">Sair</a></li>
        </ul>
    </div>

    <script src="js/app.js"></script>
    <script src="js/chart.min.js"></script>
</body>
</html>
